<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Helvetica, Arial, sans-serif;
            background-color: #FFFFFF;
            color: #232D4B;
        }

        nav {
            background-color: #232D4B;
            padding: 0 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        nav .logo {
            color: #FFFFFF;
            font-size: 1.4rem;
            font-weight: bold;
            letter-spacing: 1px;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 32px;
        }

        nav ul li a {
            color: #FFFFFF;
            text-decoration: none;
            font-size: 1rem;
            padding: 20px 0;
            display: block;
            border-bottom: 3px solid transparent;
            transition: border-color 0.2s;
        }

        nav ul li a:hover {
            border-bottom: 3px solid #E57200;
        }

        .nav-icon { position: relative; padding: 11px 0px;}
        .icon-btn { background: none; border: none; cursor: pointer; color: #FFFFFF; padding: 4px; display: flex; align-items: center; }
        .icon-btn svg { width: 28px; height: 28px; }
        .dropdown { display: none; position: absolute; right: 0; top: calc(100% + 8px); background: #FFFFFF; border: 1.5px solid #232D4B; border-radius: 6px; min-width: 130px; z-index: 100; overflow: hidden; }
        .dropdown a, .dropdown button { display: block; width: 100%; text-align: left; padding: 10px 16px; font-size: 0.95rem; color: #232D4B; text-decoration: none; background: none; border: none; cursor: pointer; font-family: inherit; }
        .dropdown a:hover, .dropdown button:hover { background-color: #f0f0f0; }
        .nav-icon.open .dropdown { display: block; }

        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 61px);
            padding: 40px 20px;
        }

        .login-box {
            border: 2px solid #232D4B;
            border-radius: 8px;
            padding: 48px 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-box h1 {
            font-size: 1.8rem;
            margin-bottom: 8px;
        }

        .login-box h1 span {
            color: #E57200;
        }

        .login-box p {
            font-size: 0.95rem;
            margin-bottom: 32px;
            opacity: 0.7;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.9rem;
            margin-bottom: 6px;
            font-weight: bold;
        }

        .form-group input {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid #232D4B;
            border-radius: 4px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            border-color: #E57200;
        }

        .login-btn {
            width: 100%;
            background-color: #E57200;
            color: #FFFFFF;
            border: none;
            padding: 12px;
            font-size: 1rem;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 8px;
        }

        .login-btn:hover {
            background-color: #c96200;
        }

        .membership-options {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .membership-options input[type="radio"] {
            display: none;
        }

        .membership-options label {
            flex: 1;
            text-align: center;
            padding: 12px;
            border: 2px solid #232D4B;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.2s, color 0.2s, border-color 0.2s;
        }

        .membership-options input[type="radio"]:checked + label {
            background-color: #E57200;
            color: #FFFFFF;
            border-color: #E57200;
        }

        .membership-options label:hover {
            border-color: #E57200;
        }

        .role-tooltip-wrapper { position: relative; display: inline-flex; align-items: center; }
        .role-tooltip { display: none; position: absolute; left: 24px; top: 50%; transform: translateY(-50%); background: #232D4B; color: #fff; font-size: 0.8rem; font-weight: normal; padding: 8px 12px; border-radius: 6px; width: 220px; line-height: 1.4; z-index: 10; pointer-events: none; }
        .role-tooltip-wrapper:hover .role-tooltip { display: block; }

        .no-club-option {
            margin-top: -8px;
            margin-bottom: 20px;
        }

        .no-club-option input[type="radio"] {
            display: none;
        }

        .no-club-option label {
            display: block;
            width: 100%;
            text-align: center;
            padding: 10px;
            border: 2px solid #aaa;
            border-radius: 5px;
            font-size: 0.9rem;
            color: #666;
            cursor: pointer;
            transition: background-color 0.2s, border-color 0.2s;
        }

        .no-club-option label:hover {
            border-color: #888;
            background-color: #f5f5f5;
        }

        .no-club-option input[type="radio"]:checked + label {
            background-color: #888;
            color: #FFFFFF;
            border-color: #888;
        }

        .name-row {
            display: flex;
            gap: 12px;
        }

        .name-row .form-group {
            flex: 1;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 16px 0;
            color: #999;
            font-size: 0.85rem;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #ddd;
        }

        .google-btn {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 11px;
            border: 1.5px solid #232D4B;
            border-radius: 4px;
            background: #FFFFFF;
            font-size: 1rem;
            cursor: pointer;
            color: #232D4B;
            text-decoration: none;
            transition: background-color 0.2s, opacity 0.2s;
        }

        .google-btn:hover:not([disabled]) {
            background-color: #f0f0f0;
        }

        .google-btn.disabled {
            opacity: 0.4;
            cursor: not-allowed;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <nav>
        <span class="logo">HoosLinked</span>
        <ul>
            <li><a href="{% url 'home' %}">Home</a></li>
            <li><a href="#">Get Involved</a></li>
            <li><a href="#">FAQ</a></li>
            <li class="nav-icon" id="navIcon">
                <button class="icon-btn" onclick="toggleNav()">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M17.982 18.725A7.488 7.488 0 0 0 12 15.75a7.488 7.488 0 0 0-5.982 2.975m11.963 0a9 9 0 1 0-11.963 0m11.963 0A8.966 8.966 0 0 1 12 21a8.966 8.966 0 0 1-5.982-2.275M15 9.75a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                    </svg>
                </button>
                <div class="dropdown">
                    {% if user.is_authenticated %}
                        <a href="{% url 'profile' %}">Profile</a>
                        <a href="{% url 'logout' %}">Logout</a>
                    {% else %}
                        <a href="{% url 'login' %}">Login</a>
                    {% endif %}
                </div>
            </li>
        </ul>
    </nav>

    <div class="login-container">
        <div class="login-box">
            <h1>Hoos<span>Linked</span></h1>
            <p>Sign up for an account</p>
            <form method="post">
                {% csrf_token %}
                {% if error %}<p style="color:red;margin-bottom:16px;">{{ error }}</p>{% endif %}
                <label style="display:flex;align-items:center;gap:6px;font-size:0.9rem;margin-bottom:12px;font-weight:bold;color:#232D4B;">
                    Select your current role in your club
                    <span class="role-tooltip-wrapper">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" style="width:18px;height:18px;flex-shrink:0;cursor:default;">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M9.879 7.519c1.171-1.025 3.071-1.025 4.242 0 1.172 1.025 1.172 2.687 0 3.712-.203.179-.43.326-.67.442-.745.361-1.45.999-1.45 1.827v.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 5.25h.008v.008H12v-.008Z" />
                        </svg>
                        <span class="role-tooltip">If you are an executive member of one or more clubs, select "Executive Member". Choosing the other options does not prevent you from becoming an executive member later.</span>
                    </span>
                </label>
                <div class="membership-options">
                    <input type="radio" id="executive" name="membership" value="executive">
                    <label for="executive">Executive Member</label>
                    <input type="radio" id="general" name="membership" value="general">
                    <label for="general">General Member</label>
                </div>
                <div class="no-club-option">
                    <input type="radio" id="no_club" name="membership" value="general">
                    <label for="no_club">I'm currently not in a club</label>
                </div>
                <div class="name-row">
                    <div class="form-group">
                        <label for="first_name">First Name</label>
                        <input type="text" id="first_name" name="first_name" placeholder="First name">
                    </div>
                    <div class="form-group">
                        <label for="last_name">Last Name</label>
                        <input type="text" id="last_name" name="last_name" placeholder="Last name">
                    </div>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password">
                </div>
                <button type="submit" class="login-btn">Sign up</button>
            </form>
            <div class="divider">or</div>
            <a id="googleBtn" href="#" class="google-btn disabled">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="20px" height="20px">
                    <path fill="#EA4335" d="M24 9.5c3.15 0 5.64 1.08 7.56 2.85l5.64-5.64C33.6 3.6 29.1 1.5 24 1.5 14.82 1.5 7.08 7.14 3.9 15.06l6.57 5.1C12.12 13.98 17.58 9.5 24 9.5z"/>
                    <path fill="#4285F4" d="M46.5 24c0-1.56-.15-3.06-.42-4.5H24v8.52h12.72c-.57 2.97-2.22 5.46-4.68 7.14l7.14 5.55C43.38 36.9 46.5 30.9 46.5 24z"/>
                    <path fill="#FBBC05" d="M10.47 28.16A14.6 14.6 0 0 1 9.5 24c0-1.44.24-2.82.6-4.14l-6.57-5.1A22.44 22.44 0 0 0 1.5 24c0 3.66.87 7.11 2.4 10.2l6.57-6.04z"/>
                    <path fill="#34A853" d="M24 46.5c5.1 0 9.42-1.68 12.54-4.56l-7.14-5.55c-1.74 1.17-3.99 1.86-5.4 1.86-6.42 0-11.88-4.32-13.53-10.14l-6.57 6.04C7.08 40.86 14.82 46.5 24 46.5z"/>
                </svg>
                Sign up with Google
            </a>
        </div>
    </div>

    <script>
        function toggleNav() {
            document.getElementById('navIcon').classList.toggle('open');
        }
        document.addEventListener('click', function(e) {
            const nav = document.getElementById('navIcon');
            if (!nav.contains(e.target)) nav.classList.remove('open');
        });

        document.querySelectorAll('input[name="membership"]').forEach(function(radio) {
            radio.addEventListener('change', function() {
                const btn = document.getElementById('googleBtn');
                btn.href = "{% url 'google_signup' %}?role=" + this.value;
                btn.classList.remove('disabled');
            });
        });
    </script>
</body>
</html>
