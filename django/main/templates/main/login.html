<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Helvetica, Arial, sans-serif;
            background-color: #FFFFFF;
            color: #232D4B;
        }

        nav {
            background-color: #232D4B;
            padding: 0 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        nav .logo {
            color: #FFFFFF;
            font-size: 1.4rem;
            font-weight: bold;
            letter-spacing: 1px;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 32px;
        }

        nav ul li a {
            color: #FFFFFF;
            text-decoration: none;
            font-size: 1rem;
            padding: 20px 0;
            display: block;
            border-bottom: 3px solid transparent;
            transition: border-color 0.2s;
        }

        nav ul li a:hover {
            border-bottom: 3px solid #E57200;
        }

        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 61px);
            padding: 40px 10px;
        }

        .login-box {
            border: 2px solid #232D4B;
            border-radius: 8px;
            padding: 28px 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-box h1 {
            font-size: 1.8rem;
            margin-bottom: 8px;
        }

        .login-box h1 span {
            color: #E57200;
        }

        .login-box p {
            font-size: 0.95rem;
            margin-bottom: 32px;
            opacity: 0.7;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.9rem;
            margin-bottom: 6px;
            font-weight: bold;
        }

        .form-group input {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid #232D4B;
            border-radius: 4px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            border-color: #E57200;
        }

        .login-btn {
            width: 100%;
            background-color: #E57200;
            color: #FFFFFF;
            border: none;
            padding: 12px;
            font-size: 1rem;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 8px;
        }

        .login-btn:hover {
            background-color: #c96200;
        }
    </style>
</head>
<body>

    <nav>
        <span class="logo">HoosLinked</span>
        <ul>
            <li><a href="{% url 'home' %}">Home</a></li>
            <li><a href="#">Get Involved</a></li>
            <li><a href="#">FAQ</a></li>
            <li><a href="{% url 'login' %}">Login</a></li>
        </ul>
    </nav>

    <div class="login-container">
        <div class="login-box">
            <h1>Hoos<span>Linked</span></h1>
            <p>Sign in to your account</p>
            <form method="post">
                {% csrf_token %}
                {% if error %}<p style="color:red;margin-bottom:16px;">{{ error }}</p>{% endif %}
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password">
                </div>
                <button type="submit" class="login-btn">Login</button>
            </form>
            <div style="gap: 5px"> 
                <p></p>
            </div>
            <ul>
                <p> Don't have an account? <a href="{% url 'signup' %}">Sign up</a> </p>
            </ul>
        </div>
    </div>

</body>
</html>
