<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Helvetica, Arial, sans-serif;
            background-color: #FFFFFF;
            color: #232D4B;
        }

        nav {
            background-color: #232D4B;
            padding: 0 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        nav .logo {
            color: #FFFFFF;
            font-size: 1.4rem;
            font-weight: bold;
            letter-spacing: 1px;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 32px;
        }

        nav ul li a {
            color: #FFFFFF;
            text-decoration: none;
            font-size: 1rem;
            padding: 20px 0;
            display: block;
            border-bottom: 3px solid transparent;
            transition: border-color 0.2s;
        }

        nav ul li a:hover {
            border-bottom: 3px solid #E57200;
        }

        .nav-icon { position: relative; padding: 11px 0px;}
        .icon-btn { background: none; border: none; cursor: pointer; color: #FFFFFF; padding: 4px; display: flex; align-items: center; }
        .icon-btn svg { width: 28px; height: 28px; }
        .dropdown { display: none; position: absolute; right: 0; top: calc(100% + 8px); background: #FFFFFF; border: 1.5px solid #232D4B; border-radius: 6px; min-width: 130px; z-index: 100; overflow: hidden; }
        .dropdown a, .dropdown button { display: block; width: 100%; text-align: left; padding: 10px 16px; font-size: 0.95rem; color: #232D4B; text-decoration: none; background: none; border: none; cursor: pointer; font-family: inherit; }
        .dropdown a:hover, .dropdown button:hover { background-color: #f0f0f0; }
        .nav-icon.open .dropdown { display: block; }

        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 61px);
            padding: 40px 10px;
        }

        .login-box {
            border: 2px solid #232D4B;
            border-radius: 8px;
            padding: 28px 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-box h1 {
            font-size: 1.8rem;
            margin-bottom: 8px;
        }

        .login-box h1 span {
            color: #E57200;
        }

        .login-box p {
            font-size: 0.95rem;
            margin-bottom: 32px;
            opacity: 0.7;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.9rem;
            margin-bottom: 6px;
            font-weight: bold;
        }

        .form-group input {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid #232D4B;
            border-radius: 4px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            border-color: #E57200;
        }

        .login-btn {
            width: 100%;
            background-color: #E57200;
            color: #FFFFFF;
            border: none;
            padding: 12px;
            font-size: 1rem;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 8px;
        }

        .login-btn:hover {
            background-color: #c96200;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 16px 0;
            color: #999;
            font-size: 0.85rem;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #ddd;
        }

        .google-btn {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 11px;
            border: 1.5px solid #232D4B;
            border-radius: 4px;
            background: #FFFFFF;
            font-size: 1rem;
            cursor: pointer;
            color: #232D4B;
            text-decoration: none;
            transition: background-color 0.2s;
        }

        .google-btn:hover {
            background-color: #f0f0f0;
        }
    </style>
</head>
<body>

    <nav>
        <span class="logo">HoosLinked</span>
        <ul>
            <li><a href="{% url 'home' %}">Home</a></li>
            <li><a href="{% url 'get_involved' %}">Get Involved</a></li>
            <li><a href="{% url 'events' %}">Events</a></li>
            <li><a href="#">FAQ</a></li>
            <li class="nav-icon" id="navIcon">
                <button class="icon-btn" onclick="toggleNav()">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M17.982 18.725A7.488 7.488 0 0 0 12 15.75a7.488 7.488 0 0 0-5.982 2.975m11.963 0a9 9 0 1 0-11.963 0m11.963 0A8.966 8.966 0 0 1 12 21a8.966 8.966 0 0 1-5.982-2.275M15 9.75a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                    </svg>
                </button>
                <div class="dropdown">
                    {% if user.is_authenticated %}
                        <a href="{% url 'profile' %}">Profile</a>
                        <a href="{% url 'logout' %}">Logout</a>
                    {% else %}
                        <a href="{% url 'login' %}">Login</a>
                    {% endif %}
                </div>
            </li>
        </ul>
    </nav>

    <div class="login-container">
        <div class="login-box">
            <h1>Hoos<span>Linked</span></h1>
            <p>Sign in to your account</p>
            <form method="post">
                {% csrf_token %}
                {% if error %}<p style="color:red;margin-bottom:16px;">{{ error }}</p>{% endif %}
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password">
                </div>
                <button type="submit" class="login-btn">Login</button>
            </form>
            <div class="divider">or</div>
            <!-- google_login url is from allauth.urls -->
            <a href="{% url 'google_login' %}" class="google-btn"> 
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="20px" height="20px">
                    <path fill="#EA4335" d="M24 9.5c3.15 0 5.64 1.08 7.56 2.85l5.64-5.64C33.6 3.6 29.1 1.5 24 1.5 14.82 1.5 7.08 7.14 3.9 15.06l6.57 5.1C12.12 13.98 17.58 9.5 24 9.5z"/>
                    <path fill="#4285F4" d="M46.5 24c0-1.56-.15-3.06-.42-4.5H24v8.52h12.72c-.57 2.97-2.22 5.46-4.68 7.14l7.14 5.55C43.38 36.9 46.5 30.9 46.5 24z"/>
                    <path fill="#FBBC05" d="M10.47 28.16A14.6 14.6 0 0 1 9.5 24c0-1.44.24-2.82.6-4.14l-6.57-5.1A22.44 22.44 0 0 0 1.5 24c0 3.66.87 7.11 2.4 10.2l6.57-6.04z"/>
                    <path fill="#34A853" d="M24 46.5c5.1 0 9.42-1.68 12.54-4.56l-7.14-5.55c-1.74 1.17-3.99 1.86-5.4 1.86-6.42 0-11.88-4.32-13.53-10.14l-6.57 6.04C7.08 40.86 14.82 46.5 24 46.5z"/>
                </svg>
                Sign in with Google
            </a>
            <ul style="margin-top: 16px;">
                <p> Don't have an account? <a href="{% url 'signup' %}">Sign up</a> </p>
            </ul>
        </div>
    </div>

    <script>
        function toggleNav() {
            document.getElementById('navIcon').classList.toggle('open');
        }
        document.addEventListener('click', function(e) {
            const nav = document.getElementById('navIcon');
            if (!nav.contains(e.target)) nav.classList.remove('open');
        });
    </script>
</body>
</html>
