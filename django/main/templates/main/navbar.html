<nav style="position:relative;">
<a href="{% url 'home' %}" class="logo" style="text-decoration:none;">HoosLinked</a>

<div style="position:absolute;left:50%;transform:translateX(-50%);width:340px;">
    <form method="get" action="{% url 'global_search' %}" style="margin:0;">
        <div style="display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.25);border-radius:8px;padding:7px 14px;width:100%;">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" style="width:18px;height:18px;color:#fff;flex-shrink:0;">
                <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
            </svg>

            <input
                type="text"
                name="q"
                value="{{ request.GET.q|default:'' }}"
                placeholder="Search for clubs, events, etc."
                style="background:none;border:none;outline:none;color:#fff;font-size:0.9rem;font-family:inherit;width:100%;"
            >
        </div>
    </form>
</div>

<ul>
<li><a href="{% url 'get_involved' %}">Clubs</a></li>
<li><a href="{% url 'events' %}">Events</a></li>
<li class="nav-icon" id="navIcon">
<button class="icon-btn" onclick="toggleNav()">
<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
<path stroke-linecap="round" stroke-linejoin="round"
d="M17.982 18.725A7.488 7.488 0 0 0 12 15.75a7.488 7.488 0 0 0-5.982 2.975
m11.963 0a9 9 0 1 0-11.963 0
m11.963 0A8.966 8.966 0 0 1 12 21a8.966 8.966 0 0 1-5.982-2.275
M15 9.75a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
</svg>
</button>
<div class="dropdown">
{% if user.is_authenticated %}
<a href="{% url 'profile' %}">Profile</a>
<a href="{% url 'logout' %}">Logout</a>
{% else %}
<a href="{% url 'login' %}">Login</a>
{% endif %}
</div>
</li>
</ul>
</nav>
