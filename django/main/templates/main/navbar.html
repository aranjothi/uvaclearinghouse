<style>
nav {
    background-color: #232D4B;
    padding: 0 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: relative;
    z-index: 99999;
    overflow: visible;
}
nav .logo { color: #FFFFFF; font-size: 1.4rem; font-weight: bold; }
nav ul { list-style: none; display: flex; gap: 32px; align-items: center; margin: 0; padding: 0; }
nav ul li a { color: #FFFFFF; text-decoration: none; font-size: 1rem; padding: 20px 0; display: block; border-bottom: 3px solid transparent; }
nav ul li a:hover { border-bottom: 3px solid #E57200; }
</style>
<nav>
<a href="{% url 'home' %}" class="logo" style="text-decoration:none;">HoosLinked</a>

<div style="position:absolute;left:50%;transform:translateX(-50%);width:380px;" id="searchWrapper">
    <form method="get" action="{% url 'global_search' %}" style="margin:0;" id="searchForm" autocomplete="off">
        <div style="display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.25);border-radius:8px;padding:7px 14px;width:100%;">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" style="width:18px;height:18px;color:#fff;flex-shrink:0;">
                <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
            </svg>
            <input
                type="text"
                name="q"
                id="searchInput"
                value="{{ request.GET.q|default:'' }}"
                placeholder="Search for clubs, events, people..."
                style="background:none;border:none;outline:none;color:#fff;font-size:0.9rem;font-family:inherit;width:100%;"
            >
        </div>
    </form>

    <!-- Live search dropdown -->
    <div id="searchDropdown" style="display:none;position:absolute;top:calc(100% + 6px);left:0;width:100%;background:#fff;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,0.18);z-index:99999;overflow:hidden;border:1px solid #e5e5e5;">
    </div>
</div>

<ul style="align-items:center;">
{% load static %}
<li><a href="{% url 'get_involved' %}">Clubs</a></li>
<li><a href="{% url 'events' %}">Events</a></li>
<li><a href="{% url 'help_support' %}">Help</a></li>
{% if user.is_authenticated %}
<li style="display:flex;align-items:center;">
    <div style="display:flex;align-items:center;gap:14px;border:1.5px solid rgba(255,255,255,0.4);border-radius:999px;padding:5px 18px;height:40px;">
        <a href="{% url 'profile' %}" title="Profile" style="display:flex;align-items:center;border-bottom:none !important;opacity:0.85;" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.85'">
            {% if user.profile_picture %}
            <img src="{{ user.profile_picture.url }}" alt="{{ user.username }}" style="width:28px;height:28px;border-radius:50%;object-fit:cover;">
            {% else %}
            <img src="{% static 'defaultpfp.jpg' %}" alt="{{ user.username }}" style="width:28px;height:28px;border-radius:50%;object-fit:cover;">
            {% endif %}
        </a>
        <a href="{% url 'dm_inbox' %}" title="Messages" style="display:flex;align-items:center;border-bottom:none !important;opacity:0.85;" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.85'">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" style="width:20px;height:20px;">
                <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25h-15a2.25 2.25 0 0 1-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25m19.5 0v.243a2.25 2.25 0 0 1-1.07 1.916l-7.5 4.615a2.25 2.25 0 0 1-2.36 0L3.32 8.91a2.25 2.25 0 0 1-1.07-1.916V6.75" />
            </svg>
        </a>
        <a href="{% url 'logout' %}" title="Logout" style="display:flex;align-items:center;border-bottom:none !important;opacity:0.85;" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.85'">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" style="width:20px;height:20px;">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15m3 0 3-3m0 0-3-3m3 3H9" />
            </svg>
        </a>
    </div>
</li>
{% else %}
<li style="display:flex;align-items:center;">
    <div style="display:flex;align-items:center;gap:14px;border:1.5px solid rgba(255,255,255,0.4);border-radius:999px;padding:5px 18px;height:40px;">
        <span style="display:flex;align-items:center;cursor:default;">
            <img src="{% static 'defaultpfp.jpg' %}" alt="Guest" style="width:28px;height:28px;border-radius:50%;object-fit:cover;">
        </span>
        <a href="{% url 'login' %}" title="Login" style="display:flex;align-items:center;gap:6px;border-bottom:none !important;color:#fff;opacity:0.85;" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.85'">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" style="width:20px;height:20px;">
                <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 9V5.25A2.25 2.25 0 0 1 10.5 3h6a2.25 2.25 0 0 1 2.25 2.25v13.5A2.25 2.25 0 0 1 16.5 21h-6a2.25 2.25 0 0 1-2.25-2.25V15M12 9l3 3m0 0-3 3m3-3H2.25" />
            </svg>
            <span style="font-size:0.9rem;font-weight:500;">Login</span>
        </a>
    </div>
</li>
{% endif %}
</ul>
</nav>

<style>
/* Save button on club cards */
.save-btn {
    position: absolute;
    top: 8px;
    right: 8px;
    z-index: 3;
    background: rgba(255,255,255,0.92);
    border: none;
    border-radius: 50%;
    width: 34px;
    height: 34px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    padding: 0;
    transition: background 0.15s, transform 0.1s;
    box-shadow: 0 1px 4px rgba(0,0,0,0.15);
}
.save-btn:hover { background: #fff; transform: scale(1.08); }
.save-btn svg { width: 18px; height: 18px; color: #232D4B; display: block; }
.save-btn .icon-unsave { display: none; }
.save-btn.saved .icon-save { display: none; }
.save-btn.saved .icon-unsave { display: block; }

.search-section { padding: 10px 14px 4px; }
.search-section-label {
    font-size: 0.7rem;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: #888;
    margin-bottom: 4px;
}
.search-result-item {
    display: block;
    padding: 8px 14px;
    text-decoration: none;
    color: #232D4B;
    font-size: 0.9rem;
    transition: background 0.1s;
}
.search-result-item:hover { background: #f4f5f7; }
.search-result-item .result-sub { font-size: 0.78rem; color: #888; margin-top: 1px; }
.search-see-more {
    display: block;
    padding: 7px 14px 10px;
    font-size: 0.82rem;
    font-weight: bold;
    color: #E57200;
    text-decoration: none;
    cursor: pointer;
}
.search-see-more:hover { text-decoration: underline; }
.search-divider { border: none; border-top: 1px solid #f0f0f0; margin: 4px 0; }
</style>

<script>
function getCsrf() {
    const m = document.cookie.match(/csrftoken=([^;]+)/);
    return m ? m[1] : '';
}

function toggleSave(btn, slug) {
    fetch('/clubs/' + slug + '/save/', {
        method: 'POST',
        headers: { 'X-CSRFToken': getCsrf() },
    })
    .then(r => r.json())
    .then(data => {
        btn.classList.toggle('saved', data.saved);
        btn.title = data.saved ? 'Unsave' : 'Save';
    });
}

(function() {
    const input = document.getElementById('searchInput');
    const dropdown = document.getElementById('searchDropdown');
    let debounceTimer;

    if (!input) return;

    input.addEventListener('input', function() {
        clearTimeout(debounceTimer);
        const q = this.value.trim();
        if (q.length < 2) { dropdown.style.display = 'none'; return; }
        debounceTimer = setTimeout(() => fetchSuggestions(q), 200);
    });

    input.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') dropdown.style.display = 'none';
    });

    document.addEventListener('click', function(e) {
        if (!document.getElementById('searchWrapper').contains(e.target)) {
            dropdown.style.display = 'none';
        }
    });

    function fetchSuggestions(q) {
        fetch('/search/suggest/?q=' + encodeURIComponent(q))
            .then(r => r.json())
            .then(data => renderDropdown(q, data));
    }

    function renderDropdown(q, data) {
        const hasUsers = data.users.length > 0;
        const hasClubs = data.clubs.length > 0;
        const hasEvents = data.events.length > 0;

        if (!hasUsers && !hasClubs && !hasEvents) {
            dropdown.innerHTML = '<div style="padding:14px 16px;color:#888;font-size:0.9rem;">No results found.</div>';
            dropdown.style.display = 'block';
            return;
        }

        let html = '';
        const searchUrl = '/search/?q=' + encodeURIComponent(q);

        if (hasUsers) {
            html += '<div class="search-section"><div class="search-section-label">People</div></div>';
            data.users.forEach(u => {
                html += `<a href="${u.url}" class="search-result-item">
                    <div>${u.name}</div>
                    <div class="result-sub">@${u.username}</div>
                </a>`;
            });
            html += `<a href="${searchUrl}&filter=users" class="search-see-more">See more people &rarr;</a>`;
            if (hasClubs || hasEvents) html += '<hr class="search-divider">';
        }

        if (hasClubs) {
            html += '<div class="search-section"><div class="search-section-label">Clubs</div></div>';
            data.clubs.forEach(c => {
                html += `<a href="${c.url}" class="search-result-item">${c.name}</a>`;
            });
            html += `<a href="${searchUrl}&filter=clubs" class="search-see-more">See more clubs &rarr;</a>`;
            if (hasEvents) html += '<hr class="search-divider">';
        }

        if (hasEvents) {
            html += '<div class="search-section"><div class="search-section-label">Events</div></div>';
            data.events.forEach(e => {
                html += `<a href="${e.url}" class="search-result-item">
                    <div>${e.title}</div>
                    <div class="result-sub">${e.date} &middot; ${e.club}</div>
                </a>`;
            });
            html += `<a href="${searchUrl}&filter=events" class="search-see-more">See more events &rarr;</a>`;
        }

        dropdown.innerHTML = html;
        dropdown.style.display = 'block';
    }
})();
</script>
