<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Profile</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Helvetica, Arial, sans-serif;
            background-color: #FFFFFF;
            color: #232D4B;
        }

        nav {
            background-color: #232D4B;
            padding: 0 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        nav .logo {
            color: #FFFFFF;
            font-size: 1.4rem;
            font-weight: bold;
            letter-spacing: 1px;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 32px;
            align-items: center;
        }

        nav ul li a {
            color: #FFFFFF;
            text-decoration: none;
            font-size: 1rem;
            padding: 20px 0;
            display: block;
            border-bottom: 3px solid transparent;
            transition: border-color 0.2s;
        }

        nav ul li a:hover {
            border-bottom: 3px solid #E57200;
        }

        .nav-icon {
            position: relative;
            padding: 11px 0;
        }

        .icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: #FFFFFF;
            padding: 4px;
            display: flex;
            align-items: center;
        }

        .icon-btn svg {
            width: 28px;
            height: 28px;
        }

        .dropdown {
            display: none;
            position: absolute;
            right: 0;
            top: calc(100% + 8px);
            background: #FFFFFF;
            border: 1.5px solid #232D4B;
            border-radius: 6px;
            min-width: 130px;
            z-index: 100;
            overflow: hidden;
        }

        .dropdown a,
        .dropdown button {
            display: block;
            width: 100%;
            text-align: left;
            padding: 10px 16px;
            font-size: 0.95rem;
            color: #232D4B;
            text-decoration: none;
            background: none;
            border: none;
            cursor: pointer;
            font-family: inherit;
        }

        .dropdown a:hover,
        .dropdown button:hover {
            background-color: #f0f0f0;
        }

        .nav-icon.open .dropdown {
            display: block;
        }

        .content {
            padding: 60px 40px;
        }

        .content h1 {
            font-size: 2rem;
            margin-bottom: 30px;
        }

        .content h1 span {
            color: #E57200;
        }

        .profile-form {
            max-width: 500px;
            background-color: #f8f8f8;
            padding: 30px;
            border-radius: 10px;
        }

        .profile-form label {
            display: block;
            font-size: 1rem;
            font-weight: bold;
            margin-bottom: 8px;
            margin-top: 18px;
        }

        .profile-form input,
        .profile-form select {
            width: 100%;
            padding: 12px;
            font-size: 1rem;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-family: inherit;
        }

        .profile-form button {
            margin-top: 28px;
            background-color: #E57200;
            color: #FFFFFF;
            border: none;
            padding: 12px 22px;
            font-size: 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
        }

        .profile-form button:hover {
            background-color: #c86100;
        }

        .error {
            color: #b00020;
            margin-bottom: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <nav>
        <span class="logo">HoosLinked</span>
        <ul>
            <li><a href="{% url 'home' %}">Home</a></li>
            <li><a href="#">Get Involved</a></li>
            <li><a href="#">FAQ</a></li>
            <li class="nav-icon" id="navIcon">
                <button class="icon-btn" type="button" onclick="toggleNav()">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M17.982 18.725A7.488 7.488 0 0 0 12 15.75a7.488 7.488 0 0 0-5.982 2.975m11.963 0a9 9 0 1 0-11.963 0m11.963 0A8.966 8.966 0 0 1 12 21a8.966 8.966 0 0 1-5.982-2.275M15 9.75a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                    </svg>
                </button>
                <div class="dropdown">
                    {% if user.is_authenticated %}
                        <a href="{% url 'profile' %}">Profile</a>
                        <a href="{% url 'logout' %}">Logout</a>
                    {% else %}
                        <a href="{% url 'login' %}">Login</a>
                    {% endif %}
                </div>
            </li>
        </ul>
    </nav>

    <div class="content">
        <h1>Create <span>Your Profile</span></h1>

        <form method="post" class="profile-form">
            {% csrf_token %}

            {% if error %}
                <p class="error">{{ error }}</p>
            {% endif %}

            <label for="age">Age</label>
            <input type="number" name="age" id="age" required>

            <label for="birthday">Birthday</label>
            <input type="date" name="birthday" id="birthday" required>

            <label for="year">Year</label>
            <select name="year" id="year" required>
                <option value="">Select year</option>
                <option value="1">1st Year</option>
                <option value="2">2nd Year</option>
                <option value="3">3rd Year</option>
                <option value="4">4th Year</option>
            </select>

            <label for="school">School</label>
            <select name="school" id="school" required>
                <option value="">Select school</option>
                <option value="engineering">School of Engineering and Applied Science</option>
                <option value="cas">College of Arts and Sciences</option>
                <option value="commerce">McIntire School of Commerce</option>
                <option value="architecture">School of Architecture</option>
                <option value="education">School of Education and Human Development</option>
                <option value="nursing">School of Nursing</option>
                <option value="batten">Batten School of Leadership and Public Policy</option>
            </select>

            <button type="submit">Save Profile</button>
        </form>
    </div>

    <script>
        function toggleNav() {
            document.getElementById('navIcon').classList.toggle('open');
        }

        document.addEventListener('click', function(e) {
            const nav = document.getElementById('navIcon');
            if (!nav.contains(e.target)) {
                nav.classList.remove('open');
            }
        });
    </script>
</body>
</html>
