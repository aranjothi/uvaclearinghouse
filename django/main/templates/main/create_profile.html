<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Profile</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Helvetica, Arial, sans-serif;
            background-color: #FFFFFF;
            color: #232D4B;
        }

        nav {
            background-color: #232D4B;
            padding: 0 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        nav .logo {
            color: #FFFFFF;
            font-size: 1.4rem;
            font-weight: bold;
            letter-spacing: 1px;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 32px;
            align-items: center;
        }

        nav ul li a {
            color: #FFFFFF;
            text-decoration: none;
            font-size: 1rem;
            padding: 20px 0;
            display: block;
            border-bottom: 3px solid transparent;
            transition: border-color 0.2s;
        }

        nav ul li a:hover {
            border-bottom: 3px solid #E57200;
        }

        .nav-icon {
            position: relative;
            padding: 11px 0;
        }

        .icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: #FFFFFF;
            padding: 4px;
            display: flex;
            align-items: center;
        }

        .icon-btn svg {
            width: 28px;
            height: 28px;
        }

        .dropdown {
            display: none;
            position: absolute;
            right: 0;
            top: calc(100% + 8px);
            background: #FFFFFF;
            border: 1.5px solid #232D4B;
            border-radius: 6px;
            min-width: 130px;
            z-index: 100;
            overflow: hidden;
        }

        .dropdown a,
        .dropdown button {
            display: block;
            width: 100%;
            text-align: left;
            padding: 10px 16px;
            font-size: 0.95rem;
            color: #232D4B;
            text-decoration: none;
            background: none;
            border: none;
            cursor: pointer;
            font-family: inherit;
        }

        .dropdown a:hover,
        .dropdown button:hover {
            background-color: #f0f0f0;
        }

        .nav-icon.open .dropdown {
            display: block;
        }

        .content {
            padding: 60px 40px;
        }

        .content h1 {
            font-size: 2rem;
            margin-bottom: 30px;
        }

        .content h1 span {
            color: #E57200;
        }

        .profile-form {
            max-width: 500px;
            background-color: #f8f8f8;
            padding: 30px;
            border-radius: 10px;
        }

        .profile-form label {
            display: block;
            font-size: 1rem;
            font-weight: bold;
            margin-bottom: 8px;
            margin-top: 18px;
        }

        .profile-form input:not([type="file"]),
        .profile-form select {
            width: 100%;
            padding: 12px;
            font-size: 1rem;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-family: inherit;
        }

        .profile-form input[type="file"] {
            font-size: 1rem;
            font-family: inherit;
        }

        .profile-form button {
            margin-top: 28px;
            background-color: #E57200;
            color: #FFFFFF;
            border: none;
            padding: 12px 22px;
            font-size: 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
        }

        .profile-form button:hover {
            background-color: #c86100;
        }

        .error {
            color: #b00020;
            margin-bottom: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    {% include 'main/navbar.html' %}

    <div class="content">
        <h1>Create <span>Your Profile</span></h1>

        <form method="post" enctype="multipart/form-data" class="profile-form">
            {% csrf_token %}

            {% if error %}
                <p class="error">{{ error }}</p>
            {% endif %}

            <label for="profile_picture">Profile Picture</label>
            <input type="file" name="profile_picture" id="profile_picture" accept="image/*">


            <label for="birthday">Birthday</label>
            <input type="date" name="birthday" id="birthday" value="{{ user.birthday|date:'Y-m-d'|default:'' }}" required>

            <label for="year">Year</label>
            <select name="year" id="year" required>
                <option value="">Select year</option>
                <option value="1" {% if user.year == "1" %}selected{% endif %}>1st Year</option>
                <option value="2" {% if user.year == "2" %}selected{% endif %}>2nd Year</option>
                <option value="3" {% if user.year == "3" %}selected{% endif %}>3rd Year</option>
                <option value="4" {% if user.year == "4" %}selected{% endif %}>4th Year</option>
            </select>

            <label for="school">School</label>
            <select name="school" id="school" required>
                <option value="">Select school</option>
                <option value="engineering" {% if user.school == "engineering" %}selected{% endif %}>School of Engineering and Applied Science</option>
                <option value="cas" {% if user.school == "cas" %}selected{% endif %}>College of Arts and Sciences</option>
                <option value="commerce" {% if user.school == "commerce" %}selected{% endif %}>McIntire School of Commerce</option>
                <option value="architecture" {% if user.school == "architecture" %}selected{% endif %}>School of Architecture</option>
                <option value="education" {% if user.school == "education" %}selected{% endif %}>School of Education and Human Development</option>
                <option value="nursing" {% if user.school == "nursing" %}selected{% endif %}>School of Nursing</option>
                <option value="batten" {% if user.school == "batten" %}selected{% endif %}>Batten School of Leadership and Public Policy</option>
            </select>

            <button type="submit">Save Profile</button>
        </form>
    </div>

    <script>
        function toggleNav() {
            document.getElementById('navIcon').classList.toggle('open');
        }

        document.addEventListener('click', function(e) {
            const nav = document.getElementById('navIcon');
            if (!nav.contains(e.target)) {
                nav.classList.remove('open');
            }
        });
    </script>
{% include 'main/chat_widget.html' %}
</body>
</html>
