<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ club.name }}</title>

<style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* Page styling */

body {
    font-family: Helvetica, Arial, sans-serif;
    background-color: #FFFFFF;
    color: #232D4B;
}

/* Navbar */

nav {
    background-color: #232D4B;
    padding: 0 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
}

nav .logo {
    color: #FFFFFF;
    font-size: 1.4rem;
    font-weight: bold;
}

nav ul {
    list-style: none;
    display: flex;
    gap: 32px;
}

nav ul li a {
    color: #FFFFFF;
    text-decoration: none;
    font-size: 1rem;
    padding: 20px 0;
    display: block;
    border-bottom: 3px solid transparent;
}

nav ul li a:hover {
    border-bottom: 3px solid #E57200;
}

/* Page header */

.page-header {
    padding: 50px 40px 20px 40px;
}

.page-header h1 {
    font-size: 2.5rem;
    font-weight: bold;
}

.page-header span {
    color: #E57200;
}

/* Club container */

.club-container {
    padding: 40px;
    display: flex;
    justify-content: center;
}

/* Club card */

.club-card {
    max-width: 750px;
    width: 100%;
    background-color: #f7f7f7;
    border-radius: 12px;
    padding: 30px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
}

/* Club image */

.club-image {
    width: 100%;
    height: 260px;
    background-color: #ddd;
    border-radius: 10px;
    margin-bottom: 24px;

    display: flex;
    align-items: center;
    justify-content: center;
    color: #666;
}

/* Title */

.club-title {
    font-size: 2rem;
    margin-bottom: 16px;
}

/* Description */

.club-description {
    font-size: 1rem;
    line-height: 1.6;
    color: #444;
    margin-bottom: 28px;
}

/* Buttons */

.button-row {
    display: flex;
    gap: 12px;
}

.club-btn {
    background-color: #E57200;
    color: #FFFFFF;
    text-decoration: none;
    border: none;
    padding: 12px 18px;
    border-radius: 6px;
    font-weight: bold;
    cursor: pointer;
    font-family: inherit;
}

.club-btn:hover {
    background-color: #c86100;
}

.secondary-btn {
    background-color: #232D4B;
}

.secondary-btn:hover {
    background-color: #1a2238;
}

</style>
</head>

<body>

<nav>
    <span class="logo">HoosLinked</span>

    <ul>
        <li><a href="{% url 'home' %}">Home</a></li>
        <li><a href="{% url 'get_involved' %}">Get Involved</a></li>
        <li><a href="#">FAQ</a></li>
    </ul>
</nav>


<div class="page-header">
    <h1>{{ club.name }}</h1>
</div>


<div class="club-container">

    <div class="club-card">

        <div class="club-image">
            Club Image Placeholder
        </div>

        <p class="club-description">
            {{ club.description }}
        </p>

        <!--<div class="button-row">

            <form method="post" action="{% url 'join_club' club.slug %}">
                {% csrf_token %}
                <button type="submit" class="club-btn">
                    Become Member
                </button>
            </form>

            <a href="{% url 'verify_exec' club.slug %}" class="club-btn secondary-btn">
                Verify Exec
            </a>

        </div>-->

    </div>

</div>

</body>
</html>
