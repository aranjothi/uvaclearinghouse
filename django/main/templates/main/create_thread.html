<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>New Thread — {{ club.name }}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Helvetica, Arial, sans-serif; background: #f4f6fa; color: #232D4B; }
        nav { background: #232D4B; padding: 0 40px; display: flex; align-items: center; justify-content: space-between; height: 60px; }
        nav .logo { color: #fff; font-size: 1.4rem; font-weight: bold; }
        nav ul { list-style: none; display: flex; gap: 24px; }
        nav ul li a { color: #fff; text-decoration: none; font-size: 0.95rem; }
        .container { max-width: 600px; margin: 60px auto; padding: 0 20px; }
        .card { background: #fff; padding: 36px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        h1 { font-size: 1.4rem; margin-bottom: 6px; }
        .sub { color: #888; font-size: 0.9rem; margin-bottom: 28px; }
        label { display: block; font-weight: 600; font-size: 0.9rem; margin-bottom: 6px; }
        input[type="text"] { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 1rem; font-family: inherit; }
        .checkbox-row { display: flex; align-items: center; gap: 10px; margin-top: 18px; font-size: 0.9rem; }
        .checkbox-row input { width: 18px; height: 18px; }
        button { margin-top: 24px; width: 100%; padding: 13px; background: #232D4B; color: #fff; border: none; border-radius: 6px; font-weight: bold; font-size: 1rem; cursor: pointer; }
        button:hover { background: #1a2238; }
        .back { display: inline-block; margin-bottom: 20px; font-size: 0.85rem; color: #E57200; text-decoration: none; }
    </style>
</head>
<body>
<nav>
    <span class="logo">HoosLinked</span>
    <ul>
        <li><a href="{% url 'home' %}">Home</a></li>
        <li><a href="{% url 'get_involved' %}">Get Involved</a></li>
        {% if user.is_authenticated %}
        <li><a href="{% url 'dm_inbox' %}">Messages</a></li>
        <li><a href="{% url 'profile' %}">Profile</a></li>
        <li><a href="{% url 'logout' %}">Logout</a></li>
        {% endif %}
    </ul>
</nav>
<div class="container">
    <a class="back" href="{% url 'thread_list' slug=club.slug %}">← Back to Threads</a>
    <div class="card">
        <h1>New Thread in {{ club.name }}</h1>
        <p class="sub">Start a discussion that all club members can join.</p>
        <form method="post">
            {% csrf_token %}
            <label for="title">Thread Title</label>
            <input type="text" id="title" name="title" placeholder="e.g. Meeting recap, Question about dues…" required>
            {% if is_exec %}
            <div class="checkbox-row">
                <input type="checkbox" id="is_announcement" name="is_announcement">
                <label for="is_announcement" style="margin-bottom:0;">📢 Mark as Announcement (only officers can reply)</label>
            </div>
            {% endif %}
            <button type="submit">Create Thread</button>
        </form>
    </div>
</div>
</body>
</html>
